<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sydney Pub Crawl Trivia 🍺</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  :root {
    --bg: #1a0f08; --bg2: #2a1810; --panel: #2e1d12; --panel-light: #3d2818;
    --gold: #e0a458; --gold-bright: #f5c878; --cream: #f4e8d0;
    --green: #4caf6d; --red: #d2553f; --shadow: rgba(0,0,0,0.45); --border: #5a3d24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--cream); overflow: hidden; }

  #map { position: absolute; inset: 0; z-index: 1; background: var(--bg2); }

  /* Top banner */
  .topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; gap: 14px;
    padding: 12px 18px;
    background: linear-gradient(180deg, rgba(46,29,18,0.96), rgba(46,29,18,0.82));
    border-bottom: 2px solid var(--border);
    backdrop-filter: blur(6px);
  }
  .topbar .logo { font-size: 26px; }
  .topbar h1 { font-size: 19px; color: var(--gold-bright); letter-spacing: .5px; }
  .topbar .sub { font-size: 12px; color: var(--gold); opacity: .85; text-transform: uppercase; letter-spacing: 2px; }
  .topbar .spacer { flex: 1; }
  .progress-pill {
    background: var(--bg2); border: 1.5px solid var(--border); border-radius: 20px;
    padding: 7px 16px; font-size: 13px; font-weight: 700; color: var(--gold-bright);
    white-space: nowrap;
  }
  @media (max-width: 560px) { .topbar h1 { font-size: 16px; } .topbar .sub { display: none; } }

  /* Leaflet popup theming */
  .leaflet-popup-content-wrapper {
    background: var(--panel); color: var(--cream);
    border: 1.5px solid var(--gold); border-radius: 14px;
    box-shadow: 0 12px 30px var(--shadow);
  }
  .leaflet-popup-tip { background: var(--gold); }
  .leaflet-popup-content { margin: 16px 18px; min-width: 210px; }
  .pop-name { font-size: 18px; font-weight: 800; color: var(--gold-bright); line-height: 1.25; }
  .pop-topic { margin-top: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); }
  .pop-topic .emoji { font-size: 15px; }
  .pop-blurb { margin-top: 8px; font-size: 13px; color: var(--cream); opacity: .8; line-height: 1.45; }
  .pop-done { margin-top: 8px; font-size: 13px; color: var(--green); font-weight: 700; }
  .start-btn {
    margin-top: 14px; width: 100%; cursor: pointer;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    color: #3a2415; border: none; border-radius: 10px;
    padding: 11px; font-size: 15px; font-weight: 800; font-family: inherit;
    transition: transform .12s;
  }
  .start-btn:hover { transform: translateY(-1px); }

  /* Custom markers */
  .pub-pin {
    width: 34px; height: 34px; border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    border: 2px solid #3a2415;
    box-shadow: 0 3px 8px rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
  }
  .pub-pin span { transform: rotate(45deg); font-size: 17px; line-height: 1; }
  .pub-pin.done { background: linear-gradient(180deg, #6fd694, var(--green)); }

  /* Quiz overlay */
  .overlay {
    position: absolute; inset: 0; z-index: 2000; display: none;
    align-items: center; justify-content: center; padding: 18px;
    background: rgba(10,6,3,0.78); backdrop-filter: blur(3px);
  }
  .overlay.active { display: flex; animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  .quiz-card {
    width: 100%; max-width: 560px; max-height: calc(100% - 36px); overflow-y: auto;
    background: var(--panel); border: 2px solid var(--border); border-radius: 18px;
    box-shadow: 0 24px 70px var(--shadow);
  }
  .quiz-head {
    padding: 20px 24px 16px; border-bottom: 2px solid var(--border);
    background: linear-gradient(180deg, var(--panel-light), var(--panel));
    position: relative;
  }
  .quiz-head .pub { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); }
  .quiz-head .topic { font-size: 22px; color: var(--gold-bright); font-weight: 800; margin-top: 3px; }
  .close-x {
    position: absolute; top: 16px; right: 18px; cursor: pointer;
    background: var(--bg2); border: 1.5px solid var(--border); color: var(--cream);
    width: 34px; height: 34px; border-radius: 9px; font-size: 18px;
  }
  .close-x:hover { border-color: var(--red); color: var(--red); }

  .quiz-body { padding: 22px 24px 26px; }
  .qmeta { display: flex; justify-content: space-between; font-size: 13px; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; }
  .ptrack { height: 6px; background: var(--bg2); border-radius: 4px; margin: 12px 0 18px; overflow: hidden; }
  .pfill { height: 100%; width: 0; background: linear-gradient(90deg, var(--gold), var(--gold-bright)); transition: width .4s; }

  .qtext { font-size: 20px; font-weight: 700; text-align: center; margin: 6px 0 20px; line-height: 1.35; }
  .answers { display: grid; gap: 11px; }
  .answer {
    display: flex; align-items: center; gap: 12px; text-align: left;
    background: var(--panel-light); border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 15px; color: var(--cream); cursor: pointer;
    font-family: inherit; transition: all .12s;
  }
  .answer .key {
    flex-shrink: 0; width: 27px; height: 27px; border-radius: 7px;
    background: var(--bg2); border: 1px solid var(--border); color: var(--gold);
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px;
  }
  .answer:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--gold); }
  .answer:disabled { cursor: default; }
  .answer.correct { border-color: var(--green); background: rgba(76,175,109,.18); }
  .answer.correct .key { background: var(--green); color: #fff; }
  .answer.wrong { border-color: var(--red); background: rgba(210,85,63,.18); }
  .answer.wrong .key { background: var(--red); color: #fff; }
  .answer.dimmed { opacity: .45; }

  .feedback { text-align: center; min-height: 24px; margin-top: 16px; font-weight: 700; font-size: 15px; }
  .feedback.good { color: var(--green); } .feedback.bad { color: var(--red); }

  .btn {
    width: 100%; margin-top: 18px; cursor: pointer; font-family: inherit;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #3a2415;
    border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 800;
    transition: transform .12s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn.ghost { background: transparent; border: 1.5px solid var(--border); color: var(--gold); }

  /* Results */
  .result { text-align: center; }
  .result .big { font-size: 58px; }
  .result .score { font-size: 30px; font-weight: 800; color: var(--gold-bright); margin-top: 4px; }
  .result .msg { color: var(--cream); opacity: .8; margin-top: 6px; }
</style>
</head>
<body>
  <div class="topbar">
    <span class="logo">🍺</span>
    <div>
      <h1>Sydney Pub Crawl Trivia</h1>
      <div class="sub">Tap a pub · answer the round · clear the map</div>
    </div>
    <div class="spacer"></div>
    <div class="progress-pill" id="progressPill">0 / 12 pubs cleared</div>
  </div>

  <div id="map"></div>

  <!-- Quiz overlay -->
  <div class="overlay" id="overlay">
    <div class="quiz-card">
      <div class="quiz-head">
        <div class="pub" id="qPub"></div>
        <div class="topic" id="qTopic"></div>
        <button class="close-x" id="closeX">&times;</button>
      </div>
      <div class="quiz-body">
        <!-- play view -->
        <div id="playView">
          <div class="qmeta">
            <span id="qProgress">Question 1 / 6</span>
            <span id="qScore">Score 0</span>
          </div>
          <div class="ptrack"><div class="pfill" id="pfill"></div></div>
          <div class="qtext" id="qText"></div>
          <div class="answers" id="answers"></div>
          <div class="feedback" id="feedback"></div>
          <button class="btn" id="nextBtn" style="display:none;">Next →</button>
        </div>
        <!-- results view -->
        <div id="resultView" style="display:none;">
          <div class="result">
            <div class="big" id="rEmoji">🏅</div>
            <div class="score" id="rScore"></div>
            <div class="msg" id="rMsg"></div>
          </div>
          <button class="btn" id="againBtn">Play This Round Again 🔁</button>
          <button class="btn ghost" id="backBtn">Back to the Map 🗺️</button>
        </div>
      </div>
    </div>
  </div>

<script>
/* ===================== PUBS (curated, real Sydney locations) ===================== */
/* Each pub from publocation.com.au's Sydney list, with an accurate location and a
   distinct trivia topic — several themed to the venue. */
const PUBS = [
  { name:"Lord Nelson Brewery Hotel", area:"Millers Point", lat:-33.85966, lng:151.20270, topic:"history",
    blurb:"One of Sydney's oldest pubs — fitting for a round on Aussie history." },

/* ===================== TOPICS & QUESTIONS (answer[0] is correct) ===================== */
const TOPICS = {

    { q:"Which Australian band released 'Highway to Hell'?", a:["AC/DC","INXS","Midnight Oil","Cold Chisel"] },

    { q:"'Waltzing Matilda' is regarded as Australia's unofficial what?", a:["Anthem","Lullaby","Sea shanty","War cry"] },

  geography: { name:"World Geography", emoji:"🌍", qs:[
    { q:"What is the capital of New Zealand?", a:["Wellington","Auckland","Christchurch","Hamilton"] },

    { q:"How many planets are in our Solar System?", a:["Eight","Nine","Seven","Ten"] },
    { q:"What galaxy is Earth located in?", a:["The Milky Way","Andromeda","Whirlpool","Sombrero"] },
    { q:"Light from the Sun takes about how long to reach Earth?", a:["8 minutes","8 seconds","8 hours","8 days"] },

    { q:"What is often called the powerhouse of the cell?", a:["Mitochondria","Nucleus","Ribosome","Membrane"] },
  ]},

    { q:"What is the main ingredient in guacamole?", a:["Avocado","Tomato","Pea","Cucumber"] },

    { q:"Sushi rice is seasoned with what?", a:["Vinegar","Lemon juice","Olive oil","Honey"] },

  general: { name:"General Knowledge", emoji:"🧠", qs:[

    { q:"A Negroni classically contains gin, vermouth and what?", a:["Campari","Cola","Lime","Soda"] },

    { q:"Hops are added to beer mainly to provide what?", a:["Bitterness & aroma","Sweetness","Colour","Fizz"] },
    { q:"Tequila is made from which plant?", a:["Agave","Cactus","Sugarcane","Potato"] },
  ]},
  arts: { name:"Arts & Literature", emoji:"🎨", qs:[
    { q:"Who painted the Mona Lisa?", a:["Leonardo da Vinci","Picasso","Van Gogh","Monet"] },
    { q:"Who wrote 'Romeo and Juliet'?", a:["William Shakespeare","Charles Dickens","Jane Austen","Mark Twain"] },
    { q:"Australia's top portrait painting prize is the?", a:["Archibald Prize","Booker Prize","Turner Prize","Wynne Prize"] },
    { q:"What art movement is Salvador Dalí associated with?", a:["Surrealism","Cubism","Impressionism","Pop art"] },
    { q:"Who wrote the novel '1984'?", a:["George Orwell","Aldous Huxley","Ray Bradbury","H.G. Wells"] },
    { q:"Van Gogh famously painted 'The Starry ___'?", a:["Night","Sky","Sea","Field"] },
    { q:"Which Australian author wrote 'Cloudstreet'?", a:["Tim Winton","Peter Carey","Bryce Courtenay","Thomas Keneally"] },

  sport: { name:"Sport", emoji:"⚽", qs:[
    { q:"How many players are on a cricket team?", a:["Eleven","Ten","Nine","Twelve"] },
    { q:"State of Origin is a rivalry in which sport?", a:["Rugby League","Cricket","AFL","Soccer"] },

  animals: { name:"Animals & Wildlife", emoji:"🐬", qs:[
    { q:"A dolphin is what type of animal?", a:["Mammal","Fish","Amphibian","Reptile"] },
    { q:"What is a baby kangaroo called?", a:["Joey","Cub","Pup","Calf"] },
    { q:"The platypus is one of the few mammals that do what?", a:["Lay eggs","Fly","Breathe underwater","Hibernate yearly"] },

    { q:"How many legs does a spider have?", a:["Eight","Six","Ten","Four"] },
    { q:"Which flightless bird is native to Australia?", a:["Emu","Magpie","Kookaburra","Galah"] },
  ]},
  film: { name:"Film & TV", emoji:"🎬", qs:[
    { q:"Which film features a clownfish named Nemo?", a:["Finding Nemo","Shark Tale","Moana","The Little Mermaid"] },
    { q:"Who directed 'Jaws'?", a:["Steven Spielberg","George Lucas","James Cameron","Ridley Scott"] },
    { q:"Which Australian actor played Wolverine in the X-Men films?", a:["Hugh Jackman","Chris Hemsworth","Russell Crowe","Eric Bana"] },
    { q:"'Game of Thrones' is based on books by whom?", a:["George R.R. Martin","J.R.R. Tolkien","J.K. Rowling","Stephen King"] },
    { q:"'Neighbours' and 'Home and Away' are long-running Australian what?", a:["Soap operas","Game shows","News programs","Sitcoms"] },
    { q:"Which 1994 film featured a drag road-trip across the outback?", a:["Priscilla, Queen of the Desert","Crocodile Dundee","Mad Max","Australia"] },
    { q:"Who plays the lead in the 'Crocodile Dundee' films?", a:["Paul Hogan","Mel Gibson","Hugh Jackman","Steve Irwin"] },
  ]},
};

const QUESTIONS_PER_GAME = 6;

/* ===================== MAP ===================== */
const map = L.map('map', { zoomControl: true }).setView([-33.8708, 151.2090], 14);
L.control.zoom({ position: 'bottomright' });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 20,
}).addTo(map);

const completed = new Set();            // pub indices cleared
const markers = [];                     // marker by pub index

function pinIcon(done) {
  return L.divIcon({
    className: '',
    html: `<div class="pub-pin ${done ? 'done' : ''}"><span>${done ? '✅' : '🍺'}</span></div>`,
    iconSize: [34, 34], iconAnchor: [17, 34], popupAnchor: [0, -32],
  });
}

function popupHtml(i) {
  const p = PUBS[i], t = TOPICS[p.topic];
  const done = completed.has(i);
  return `
    <div class="pop-name">${p.name}</div>
    <div class="pop-topic"><span class="emoji">${t.emoji}</span> ${t.name}</div>
    <div class="pop-blurb">${p.blurb}</div>
    ${done ? `<div class="pop-done">✅ Cleared — best score ${completed_score[i]} / ${QUESTIONS_PER_GAME}</div>` : ``}
    <button class="start-btn" onclick="startQuiz(${i})">${done ? 'Play Again 🔁' : 'Start Quiz ▶'}</button>
  `;
}

const completed_score = {};
const bounds = [];
PUBS.forEach((p, i) => {
  const m = L.marker([p.lat, p.lng], { icon: pinIcon(false) }).addTo(map);
  m.bindPopup(popupHtml(i), { closeButton: true });
  m.on('popupopen', () => m.setPopupContent(popupHtml(i)));
  markers.push(m);
  bounds.push([p.lat, p.lng]);
});
map.fitBounds(bounds, { padding: [70, 70] });

function updateProgress() {
  document.getElementById('progressPill').textContent = `${completed.size} / ${PUBS.length} pubs cleared`;
}

/* ===================== QUIZ ENGINE ===================== */
let quiz = null;
const $ = (id) => document.getElementById(id);

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0; [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

window.startQuiz = function (pubIndex) {
  map.closePopup();
  const p = PUBS[pubIndex];
  const t = TOPICS[p.topic];
  const deck = shuffle(t.qs).slice(0, QUESTIONS_PER_GAME).map(item => {
    const correct = item.a[0];
    const options = shuffle(item.a);
    return { q: item.q, options, correctIndex: options.indexOf(correct) };
  });
  quiz = { pubIndex, deck, current: 0, score: 0, answered: false };

  $('qPub').textContent = `${p.name} · ${p.area}`;
  $('qTopic').textContent = `${t.emoji} ${t.name}`;
  $('resultView').style.display = 'none';
  $('playView').style.display = 'block';
  $('overlay').classList.add('active');
  renderQuestion();
};

function renderQuestion() {
  quiz.answered = false;
  const item = quiz.deck[quiz.current];
  $('qProgress').textContent = `Question ${quiz.current + 1} / ${quiz.deck.length}`;
  $('qScore').textContent = `Score ${quiz.score}`;
  $('pfill').style.width = `${(quiz.current / quiz.deck.length) * 100}%`;
  $('qText').textContent = item.q;
  $('feedback').textContent = ''; $('feedback').className = 'feedback';
  $('nextBtn').style.display = 'none';

  const keys = ['A', 'B', 'C', 'D'];
  const box = $('answers');
  box.innerHTML = '';
  item.options.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'answer';
    b.innerHTML = `<span class="key">${keys[i]}</span><span>${opt}</span>`;
    b.onclick = () => selectAnswer(i);
    box.appendChild(b);
  });
}

function selectAnswer(idx) {
  if (quiz.answered) return;
  quiz.answered = true;
  const item = quiz.deck[quiz.current];
  Array.from($('answers').children).forEach((b, i) => {
    b.disabled = true;
    if (i === item.correctIndex) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });
  const fb = $('feedback');
  if (idx === item.correctIndex) {
    quiz.score++;
    fb.textContent = '✅ Correct! +1';
    fb.className = 'feedback good';
  } else {
    fb.textContent = `❌ Answer: ${item.options[item.correctIndex]}`;
    fb.className = 'feedback bad';
  }
  $('qScore').textContent = `Score ${quiz.score}`;
  const nb = $('nextBtn');
  nb.style.display = 'block';
  nb.textContent = (quiz.current + 1 >= quiz.deck.length) ? 'See Result 🏆' : 'Next →';
}

$('nextBtn').onclick = () => {
  quiz.current++;
  if (quiz.current >= quiz.deck.length) showResult();
  else renderQuestion();
};

function showResult() {
  const i = quiz.pubIndex;
  const prev = completed_score[i] ?? -1;
  if (quiz.score > prev) completed_score[i] = quiz.score;
  if (!completed.has(i)) { completed.add(i); markers[i].setIcon(pinIcon(true)); }
  updateProgress();

  $('playView').style.display = 'none';
  $('resultView').style.display = 'block';
  const n = quiz.deck.length, s = quiz.score;
  const pct = s / n;
  $('rScore').textContent = `${s} / ${n}`;
  $('rEmoji').textContent = pct === 1 ? '🏆' : pct >= 0.6 ? '🍺' : pct >= 0.3 ? '🙂' : '😬';
  $('rMsg').textContent =
    pct === 1 ? "Perfect round — the next shout's on the house!" :
    pct >= 0.6 ? "Nice work — that's a solid round." :
    pct >= 0.3 ? "Not bad — give it another go for the bragging rights." :
    "Tough round! Sink a schooner and try again.";
}

$('againBtn').onclick = () => startQuiz(quiz.pubIndex);
$('backBtn').onclick = $('closeX').onclick = () => {
  $('overlay').classList.remove('active');
  markers[quiz.pubIndex].openPopup();
};

updateProgress();
</script>
